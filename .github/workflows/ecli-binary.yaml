name: Build and test and publish ecli binary (multiple platforms and archs)

on:
  workflow_dispatch: 
  push:
    branches:
      - master
      - "fix*"
    paths:
      - "ecli/**"
      - "compiler/**"  # Ensure ecc and ecli releasing at same time
      - "wasm-rumtime/**"  # Release when dependencies updated
      - "third_party/**"
      - "bpf-loader-rs/**"
      - "eunomia-sdk/**"
      - ".github/**"

  pull_request:
    branches: ["*"]
    paths:
      - "ecli/**"
      - "compiler/**"
      - "wasm-rumtime/**"
      - "third_party/**"
      - "bpf-loader-rs/**"
      - "eunomia-sdk/**"
      - ".github/**"
env:
  BUILD_TYPE: Release
  INSTALL_LOCATION: .local

jobs:
  create-release-version:
    runs-on: ubuntu-latest
    if:   github.event_name == 'push' && (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/heads/fix'))
    outputs:
      version: ${{steps.set_version.outputs.result}}
    steps:
      - name: Set latest release version
        id: set_version
        uses: actions/github-script@v6
        with:
          result-encoding: string
          script: |
            const versionPattern = /^v(\d+)\.(\d+)\.(\d+)$/;

            function parseVersion(version) {
              const match = versionPattern.exec(version);
              if (!match) {
                return null;
              }
              return match.slice(1).map(Number);
            }

            function compareVersions(a, b) {
              for (let i = 0; i < a.length; i += 1) {
                if (a[i] !== b[i]) {
                  return a[i] - b[i];
                }
              }
              return 0;
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });

            const versions = [...releases.map(release => release.tag_name), ...tags.map(tag => tag.name)]
              .map(parseVersion)
              .filter(Boolean)
              .sort(compareVersions);

            if (versions.length === 0) {
              return "v0.0.1";
            }

            const [major, minor, patch] = versions[versions.length - 1];
            return `v${major}.${minor}.${patch + 1}`;

  build-full-client:
    needs: create-release-version
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    strategy:
      matrix:
        target: [ x86_64-unknown-linux-gnu ]
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: install deps
      run: |
          sudo make -C ecli install-deps
          sudo make -C bpf-loader-rs install-deps

    - name: cache dependencies
      uses: actions/cache@v3
      id: cache
      with:
        path: ${{ github.workspace }}/${{ env.INSTALL_LOCATION }}
        key: ${{ runner.os }}-dependencies

    - name: cache rust
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          compiler/cmd
          ecli
          wasm-runtime/runtime/rust
          eunomia-sdks/eunomia-rs
    - name: Prepare cargo-appimage
      uses: eunomia-bpf/prepare-cargo-appimage@v5
    - name: Install libfuse
      run: |
        sudo apt-get install -y libfuse2
    - name: Build full client
      run:  |
        cd ecli/client
        CARGO_APPIMAGE_TOOL_BIN=../../appimagetool CARGO_APPIMAGE_RUNTIME_FILE=../../runtime CARGO_APPIMAGE_OUT_FILE=ecli cargo appimage
    
    - name: test ecli
      run: |
        cd ecli
        # Install rustup manually using user root
        curl https://sh.rustup.rs -o rustup.sh
        sudo bash -c "cat rustup.sh | sh -s -- -y ; cd $PWD && /root/.cargo/bin/cargo test -p ecli-lib -- --skip test_pause_and_resume"
        cargo test -p ecli-rs --bin ecli-rs
        cargo test -p ecli-rs --bin ecli-rs --no-default-features
    - name: Package ecli
      run: |
        mkdir -p release
        cp ecli/client/ecli release/ecli
        cd release
        tar -czvf ecli-${{ matrix.target }}-${{ needs.create-release-version.outputs.version }}.tar.gz ecli
    - name: Test CLI
      run: |
        mkdir cli-test
        cd cli-test
        cp ../.github/assets/package.json .
        ../release/ecli -h
        sudo timeout -s 2 3 ../release/ecli run ./package.json || if [ $? = 124 ]; then exit 0; else exit $?; fi
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with: 
        name: "ecli-full-${{needs.create-release-version.outputs.version}}"
        path: |
          release/ecli-${{ matrix.target }}-${{ needs.create-release-version.outputs.version }}.tar.gz
          release/ecli

  build-full-client-aarch64:
    needs: create-release-version
    runs-on: ubuntu-22.04
    if: "!contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]')"
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: 'recursive'
    - name: Install dependencies for cross-building
      run: |
        sudo apt-get update
        sudo apt-get install -y g++-aarch64-linux-gnu gcc-aarch64-linux-gnu
    - name: Clone libbpf for building
      run: |
        git clone https://github.com/libbpf/libbpf
    - name: Create libs directory
      run: |
        mkdir -p libs

    - name: Build libbpf in a qemu virtual machine, and copy libs out
      uses: uraimo/run-on-arch-action@v2
      with: 
        arch: aarch64
        distro: ubuntu22.04
        run: |
          set -e
          
          echo "========== 安装依赖 =========="
          apt-get update
          apt-get install -y zlib1g-dev libelf-dev gcc make pkg-config
          
          echo "========== 开始编译 libbpf =========="
          cd /libbpf/src
          
          # QEMU 模拟环境下 GCC 可能不稳定，使用单线程编译并添加重试机制
          MAX_RETRIES=5
          RETRY_COUNT=0
          
          until make -j1 V=1; do
            RETRY_COUNT=$((RETRY_COUNT + 1))
            if [ $RETRY_COUNT -ge $MAX_RETRIES ]; then
              echo "编译失败，已重试 $MAX_RETRIES 次"
              exit 1
            fi
            echo ""
            echo "=========================================="
            echo "编译失败，正在重试 ($RETRY_COUNT/$MAX_RETRIES)..."
            echo "=========================================="
            echo ""
            sleep 3
            # 清理失败的编译产物
            make clean || true
          done
          
          echo "========== 编译成功，复制库文件 =========="
          cp libbpf.so /libs/
          cp libbpf.a /libs/ || true
          cp /usr/lib/aarch64-linux-gnu/libelf.so /libs/
          cp /usr/lib/aarch64-linux-gnu/libz.so /libs/
          
          echo "========== 库文件列表 =========="
          ls -la /libs/
        dockerRunArgs: |
          --volume "${PWD}/libbpf:/libbpf"
          --volume "${PWD}/libs:/libs"

    - name: cache rust build results
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: |
          ecli
    - name: Build ecli-client-full
      run: |
        rustup target add aarch64-unknown-linux-gnu
        # Install them, so that libbpf will find their headers
        sudo apt-get install libelf-dev zlib1g-dev
        cd ecli/client
        RUSTFLAGS="-L $(pwd)/../../libs" cargo build --release --target aarch64-unknown-linux-gnu
        cd ../..
        cp ./ecli/target/aarch64-unknown-linux-gnu/release/ecli-rs .
        mkdir data
        cp ecli-rs data
        cp .github/scripts/copy-libs.sh data
    - name: Run ecli and see what libs were loaded by ld
      uses: uraimo/run-on-arch-action@v2
      with: 
        arch: aarch64
        distro: ubuntu22.04
        run: |
          apt-get update
          apt-get install -y libelf-dev zlib1g-dev
          echo "Installation done"
          echo "Working directory $(pwd)"
          chmod +x /data/ecli-rs
          echo "Permission set done"
          chmod +x /data/copy-libs.sh
          /data/copy-libs.sh /data/ecli-rs --help
        dockerRunArgs: |
          --volume "${PWD}/data:/data"
        shell: /bin/bash
    - name: Show what libraries were copied
      run: |
        sudo chmod 777 ./data -R
        sudo chown $(whoami) ./data -R
        find ./data/libs -type f
    - name: Prepare runtime file and cargo-appimage tool
      uses: eunomia-bpf/prepare-cargo-appimage@v6
      with: 
        runtime-url: https://github.com/eunomia-bpf/prepare-cargo-appimage/raw/v6/runtime-aarch64
    - name: Install libfuse for appimagetool
      run: |
        sudo apt-get update
        sudo apt-get install libfuse2
    - name: Clone and install cargo-appimage with aarch64 launcher
      run: |
        git clone https://github.com/eunomia-bpf/cargo-appimage
        cd cargo-appimage
        CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc RUSTFLAGS="-C target-feature=+crt-static" cargo build --release --target aarch64-unknown-linux-gnu
    - name: Compose files and pack them
      run: |
        mkdir appimage-root
        cd appimage-root
        cp -r ../data/libs/* .
        mkdir -p usr/bin
        cp ../ecli-rs usr/bin/bin
        touch icon.png
        cp ../cargo-appimage/target/aarch64-unknown-linux-gnu/release/cargo-appimage-runner AppRun
        cp ../.github/scripts/cargo-appimage.desktop .
        ../appimagetool --runtime-file ../runtime . ecli-rs-aarch64
        cd ..
        cp ./appimage-root/ecli-rs-aarch64 ecli-aarch64
    - uses: actions/upload-artifact@v4
      name: Upload build result
      with:
        name: ecli-rs-aarch64
        path: ecli-aarch64

  publish-release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master' && ( github.repository_owner == 'eunomia-bpf' || github.repository_owner == 'officeyutong')
    runs-on: ubuntu-latest
    needs: [create-release-version, build-full-client, build-full-client-aarch64]
    concurrency:
      group: ${{ github.workflow }}-${{ needs.create-release-version.outputs.version }}-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - name: Download build results
        uses: actions/download-artifact@v4
        with:
          path: results
      - name: List files to release
        id: list-files
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          FILES=`find ./results -type f`
          echo "$FILES"
          echo "upload_files<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
      - name: Ensure draft release exists
        if:   github.event_name == 'push' && github.ref == 'refs/heads/master' && ( github.repository_owner == 'eunomia-bpf' || github.repository_owner == 'officeyutong')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release-version.outputs.version }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          elif ! gh release create "$RELEASE_TAG" --draft --generate-notes --target "$GITHUB_SHA"; then
            echo "Release creation raced with another workflow, re-checking state"
            gh release view "$RELEASE_TAG" >/dev/null
          fi
      - name: Upload ecli assets to draft release
        if:   github.event_name == 'push' && github.ref == 'refs/heads/master' && ( github.repository_owner == 'eunomia-bpf' || github.repository_owner == 'officeyutong')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release-version.outputs.version }}
        shell: bash
        run: |
          if [ "$(gh release view "$RELEASE_TAG" --json isDraft --jq .isDraft)" != "true" ]; then
            echo "Release $RELEASE_TAG is already published and cannot accept new assets"
            exit 1
          fi
          mapfile -t files < <(find ./results -type f | sort)
          gh release upload "$RELEASE_TAG" "${files[@]}" --clobber
      - name: Wait for ecc assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/master' && github.repository_owner == 'eunomia-bpf'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release-version.outputs.version }}
        shell: bash
        run: |
          for attempt in $(seq 1 30); do
            mapfile -t assets < <(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')
            missing=0
            for expected in ecc ecc-x86_64 ecc-aarch64; do
              if ! printf '%s\n' "${assets[@]}" | grep -Fxq "$expected"; then
                missing=1
                break
              fi
            done
            if [ "$missing" -eq 0 ]; then
              exit 0
            fi
            sleep 10
          done
          echo "Timed out waiting for ecc assets to arrive on $RELEASE_TAG"
          exit 1
      - name: Publish draft release
        if:   github.event_name == 'push' && github.ref == 'refs/heads/master' && ( github.repository_owner == 'eunomia-bpf' || github.repository_owner == 'officeyutong')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.create-release-version.outputs.version }}
        run: |
          gh release edit "$RELEASE_TAG" --draft=false
