# Simple workflow for deploying static content to GitHub Pages
name: Test bpftools examples

on:
  pull_request:
    branches: "*"

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: install deps
        run: |
             sudo make -C bpf-loader-rs install-deps

      - name: install test deps
        run:  |
              make -C examples/tests install-deps
              make -C examples/tests install-wasm-clang

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' 

      - name: test build runners
        run:  |
              make -C examples

      - name: test examples
        run:  |
              SKIP_TESTS=profile make -C examples/tests test

  examples-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: 'recursive'

      - name: install deps
        run: |
             sudo make -C bpf-loader-rs install-deps

      - name: install test deps
        run:  |
              make -C examples/tests install-deps
              make -C examples/tests install-wasm-clang

      - name: Set up python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: test build runners
        run:  |
              make -C examples

      - name: test supported arm64 examples
        run:  |
              # The hosted arm64 runner kernel does not expose every tracing hook
              # that the full example matrix expects. Keep the allowlist explicit
              # and expand it only after each example passes on the official arm64
              # runner. `opensnoop` is currently excluded because the runner
              # kernel lacks the expected syscalls/sys_enter_open tracepoint.
              TEST_CASES_DIRS='bashreadline bootstrap fentry-link kprobe-link lsm-connect mdflush minimal runqlat sigsnoop tc tcpstates xdp' \
                make -C examples/tests test
